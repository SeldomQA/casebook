metadata:
  module: "Webhooks 管理"
  feature: "添加 Webhook - 复杂业务流"
  owner: "henry.hu"
  last_reviewed: "2026-06-04"
  tags: [asset:core, mode:mixed, biz:smoke, version-compatibility]

test_cases:
  - id: "TC_WEBHOOK_LOGIC_001"
    title: "A类用户（Legacy）成功创建 V2 版本 Webhook"
    description: "验证拥有历史权限的 A 类用户，能够绕过默认 V5 限制，创建 V2 版本的 Webhook"
    priority: "P0"
    type: "business"
    preconditions:
      - "用户被标记为 A 类客户 (customer_tier = 'legacy_v2_v3')"
      - "用户当前处于 V5 版本环境"
    steps:
      # --- 【关键】只描述业务意图，不描述技术实现 ---
      - "模拟 A 类用户发起 Create Webhook 请求，指定 version=2.0"
      - "执行 Webhook 创建业务流程"
    expected_results:
      # --- 【关键】全链路断言 ---
      - "API 返回 success (200)"
      - "数据库 tr_webhooks 表中 version 字段存储为 2.0"
      - "审计日志中记录 'Legacy user created V2 webhook'"
    tags: [version-compatibility, legacy]